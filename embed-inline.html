<style>
  #ycraft-fluid-demo {

    width: 100%;

  }
  #ycraft-fluid-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;

    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;

  <img id="ycraft-fluid-logo" src="https://ycraft.dev/assets/images/fluid-logo.png" crossorigin="anonymous" alt="FLUID">
